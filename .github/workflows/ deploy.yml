name: Deploy Lambda to AWS

on:
  push:
    branches:
      - main   # 只有推送到 main 时才部署

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS CLI
        run: |
          pip install awscli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Zip daily brief function
        run: |
          pip install anthropic -t daily_brief_package/ -q
          cp daily_brief_handler.py daily_brief_package/
          cd daily_brief_package && zip -r ../daily_brief.zip . && cd ..

      - name: Deploy daily brief to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.DAILY_BRIEF_LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://daily_brief.zip
